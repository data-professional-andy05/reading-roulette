<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reading Roulette</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fff9f0;
            --ink: #2c1e1a;
            --book-w: 240px; 
            --book-h: 340px; 
        }

        body {
            background-color: #120d0c;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        /* Library Background */
        .library-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            grid-auto-rows: 100px;
            gap: 8px;
            padding: 20px;
            opacity: 0.15;
            z-index: 1;
        }

        .shelf-book { width: 100%; height: 100%; border-radius: 3px; transition: 0.1s; }

        .ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #d7ccc8;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* 3D Stage */
        .stage {
            perspective: 2000px;
            width: 600px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Book Container */
        .book {
            width: var(--book-w);
            height: var(--book-h);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
        }

        .book.visible { visibility: visible; animation: flyIn 0.8s ease-out; }
        .book.open { transform: rotateY(0deg); }

        /* Pages & Cover Shared Styling */
        .leaf {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            backface-visibility: hidden;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.4);
            border-radius: 2px 10px 10px 2px;
        }

        /* The Right Page */
        .page-right {
            background: linear-gradient(to right, #e6e0d5 0%, var(--paper) 10%, var(--paper) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transform: rotateY(0deg);
        }

        /* The Left Page */
        .page-left {
            background: linear-gradient(to left, #e6e0d5 0%, var(--paper) 10%, var(--paper) 100%);
            z-index: 2;
            transform: rotateY(0deg); 
            backface-visibility: visible; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
        }

        /* The Cover */
        .cover {
            background: #8d6e63;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 30px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            border-left: 5px solid rgba(0,0,0,0.2);
        }

        /* Open Book Animations */
        .book.open .cover { transform: rotateY(-180deg); }
        .book.open .page-left { transform: rotateY(-180deg); }

        /* Interior Details */
        .number-display {
            font-size: 7rem;
            color: var(--ink);
            opacity: 0;
            transition: opacity 0.5s 1.2s;
        }
        .book.open .number-display { opacity: 1; }

        .fake-text {
            width: 80%;
            height: 3px;
            background: #e0d9cf;
            margin: 8px 0;
            border-radius: 2px;
        }

        button {
            margin-top: 20px;
            padding: 18px 45px;
            font-size: 1.2rem;
            background: #8d6e63;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            font-family: 'Playfair Display', serif;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-3px); background: #a1887f; }
        button:disabled { opacity: 0.5; }

        @keyframes flyIn {
            0% { transform: scale(0) rotateX(30deg) translateZ(-500px); opacity: 0; }
            100% { transform: scale(1) rotateX(0) translateZ(0); opacity: 1; }
        }

        .highlight { background: #fff !important; box-shadow: 0 0 20px #fff; transform: scale(1.4); z-index: 5; }
    </style>
</head>
<body>

    <div class="library-container" id="library"></div>

    <div class="ui-layer">
        <h1 id="status">Behold the Archive...</h1>
        
        <div class="stage">
            <div class="book" id="book">
                <!-- Page Right -->
                <div class="leaf page-right">
                    <div class="number-display" id="number-display">0</div>
                </div>

                <!-- Page Left -->
                <div class="leaf page-left">
                    <div class="fake-text"></div>
                    <div class="fake-text" style="width: 60%"></div>
                    <div class="fake-text"></div>
                    <div class="fake-text"></div>
                    <div class="fake-text" style="width: 40%"></div>
                    <div style="margin-top: 40px; font-style: italic; color: #a09586;">Chapter One</div>
                </div>

                <!-- Cover -->
                <div class="leaf cover" id="cover">Your next adventure awaits...</div>
            </div>
        </div>

        <button id="draw-btn" onclick="startSelection()">Draw a Book</button>
    </div>

    <!-- Music Themes -->
    <audio id="audio-warm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="audio-cool" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="audio-bright" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <script>
        const totalBooks = 234;
        const library = document.getElementById('library');
        const bookObj = document.getElementById('book');
        const bookCover = document.getElementById('cover');
        const numberDisplay = document.getElementById('number-display');
        const statusText = document.getElementById('status');
        const drawBtn = document.getElementById('draw-btn');
        
        // --- AUDIO FIX HERE ---
        let audioCtx;

        function playPop(pitch) {
            // Create the audio context ONLY after the user clicks the button
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            
            // Scheduling slightly in the future (0.01s) guarantees it plays smoothly
            const now = audioCtx.currentTime + 0.01;
            
            osc.frequency.setValueAtTime(150 + (pitch * 1.5), now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(now);
            osc.stop(now + 0.1);
        }

        // Generate Library Background
        const shelfBooks = [];
        for (let i = 0; i < totalBooks; i++) {
            const b = document.createElement('div');
            b.className = 'shelf-book';
            b.style.backgroundColor = `hsl(${Math.random() * 360}, 25%, 25%)`;
            library.appendChild(b);
            shelfBooks.push(b);
        }

        let currentAudio = null;

        function startSelection() {
            if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            
            drawBtn.disabled = true;
            bookObj.classList.remove('open', 'visible');
            statusText.innerText = "Searching the collection...";
            
            let count = 0;
            let lastIdx = -1;

            const interval = setInterval(() => {
                if (lastIdx > -1) shelfBooks[lastIdx].classList.remove('highlight');
                lastIdx = Math.floor(Math.random() * totalBooks);
                shelfBooks[lastIdx].classList.add('highlight');
                
                // Play roulette ping!
                playPop(lastIdx);
                
                count++;
                if (count > 35) {
                    clearInterval(interval);
                    shelfBooks[lastIdx].classList.remove('highlight');
                    finalizeSelection();
                }
            }, 70);
        }

        function finalizeSelection() {
            const result = Math.floor(Math.random() * totalBooks) + 1;
            const hue = Math.floor(Math.random() * 360);
            
            // Randomize Color & Size slightly
            const h = Math.floor(Math.random() * 40) + 320;
            const w = Math.floor(Math.random() * 30) + 220;
            bookObj.style.height = h + 'px';
            bookObj.style.width = w + 'px';
            bookCover.style.backgroundColor = `hsl(${hue}, 45%, 35%)`;
            
            // Select and Play Theme Music
            if (hue < 120) currentAudio = document.getElementById('audio-warm');
            else if (hue < 240) currentAudio = document.getElementById('audio-cool');
            else currentAudio = document.getElementById('audio-bright');
            currentAudio.play();

            numberDisplay.innerText = result;
            bookObj.classList.add('visible');
            statusText.innerText = "A choice has been made!";

            setTimeout(() => {
                bookObj.classList.add('open');
                statusText.innerText = `You are reading Book #${result}`;
                
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.7 },
                    colors: [`hsl(${hue}, 45%, 35%)`, '#fff']
                });

                setTimeout(() => {
                    drawBtn.disabled = false;
                    drawBtn.innerText = "Draw Again";
                }, 2500);
            }, 1200);
        }
    </script>
</body>
</html>
