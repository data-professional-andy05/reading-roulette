<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reading Roulette</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fff9f0;
            --ink: #2c1e1a;
            --book-w: 240px; 
            --book-h: 360px; 
        }

        body {
            background-color: #120d0c; margin: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        .library-container {
            position: absolute; width: 100%; height: 100%; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            grid-auto-rows: 100px; gap: 8px; padding: 20px; opacity: 0.15; z-index: 1;
        }

        .shelf-book { width: 100%; height: 100%; border-radius: 3px; transition: 0.1s; }
        .ui-layer { position: relative; z-index: 10; text-align: center; width: 100%; }
        h1 { color: #d7ccc8; font-size: 2.2rem; margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.3s;}

        .stage { perspective: 2000px; width: 600px; height: 420px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }

        .book {
            width: var(--book-w); height: var(--book-h); position: relative;
            transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); visibility: hidden;
        }

        .book.visible { visibility: visible; animation: flyIn 0.8s ease-out; }
        .book.open { transform: translateX(120px) rotateY(0deg); } 

        .leaf {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            transform-origin: left; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            backface-visibility: hidden; box-shadow: 5px 5px 20px rgba(0,0,0,0.4); border-radius: 2px 10px 10px 2px;
        }

        .page-right {
            background: linear-gradient(to right, #e6e0d5 0%, var(--paper) 10%, var(--paper) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; transform: rotateY(0deg);
        }

        .page-left {
            background: linear-gradient(to left, #e6e0d5 0%, var(--paper) 10%, var(--paper) 100%);
            z-index: 2; transform: rotateY(0deg); backface-visibility: visible; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box;
        }

        .cover {
            background-color: #8d6e63; z-index: 4; display: flex; align-items: center; justify-content: center;
            text-align: center; color: white; padding: 20px; font-family: 'Dancing Script', cursive; font-size: 1.5rem;
            border-left: 5px solid rgba(0,0,0,0.4); box-shadow: inset 5px 0 15px rgba(0,0,0,0.3);
            
            /* Enhanced Image Sizing */
            background-size: cover; background-position: center; background-repeat: no-repeat;
            overflow: hidden; word-wrap: break-word; transition: background-image 0.5s ease-in-out;
        }

        .book.open .cover { transform: rotateY(-180deg); }
        .book.open .page-left { transform: rotateY(-180deg); }

        .book-content {
            opacity: 0; transition: opacity 0.5s 1.2s; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px; width: 100%; height: 100%; box-sizing: border-box;
        }
        
        .book.open .book-content { opacity: 1; }
        .left-content { transform: rotateY(180deg); } 

        .titulo-text { font-size: 1.6rem; color: var(--ink); margin-bottom: 10px; line-height: 1.2; }
        .autor-text { font-size: 1rem; color: #555; font-style: italic; }
        .saga-text { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: #8d6e63; margin-bottom: 5px; }
        .orden-text { font-size: 1.1rem; color: var(--ink); }
        .divider { width: 50px; height: 2px; background: #cbbca8; margin: 15px auto; }
        .placeholder-text { color: #a09586; font-style: italic; font-size: 0.9rem; }

        .main-btn {
            margin-top: 20px; padding: 18px 45px; font-size: 1.2rem; background: #8d6e63; color: white;
            border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            font-family: 'Playfair Display', serif; transition: all 0.3s;
        }
        .main-btn:hover { transform: translateY(-3px); background: #a1887f; box-shadow: 0 15px 25px rgba(0,0,0,0.4); }
        .main-btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .main-btn.btn-action { background: #4e342e; font-weight: bold; border: 2px solid #d7ccc8; }

        @keyframes flyIn {
            0% { transform: scale(0) rotateX(30deg) translateZ(-500px); opacity: 0; }
            100% { transform: scale(1) rotateX(0) translateZ(0); opacity: 1; }
        }

        .highlight { background: #fff !important; box-shadow: 0 0 20px #fff; transform: scale(1.4); z-index: 5; }
    </style>
</head>

        // App States: 'IDLE' -> 'SPINNING' -> 'WAITING_TO_OPEN' -> 'OPENED'

        function playPop(pitch) {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            const now = audioCtx.currentTime + 0.01;
            
            osc.frequency.setValueAtTime(150 + (pitch * 1.5), now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.1);
        }

        function stringToHue(str) {
            if (!str) return Math.floor(Math.random() * 360);
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return Math.abs(hash) % 360;
        }

            library.appendChild(b);
            shelfBooks.push(b);
        }

        // --- THE UPGRADED FETCH ENGINE ---
        async function fetchBookCover(title, author) {
            const query = encodeURIComponent(`${title} ${author}`);
            
            // 1. Google Books (Now checks TOP 10 results to find one with an image)
            try {
                console.log(`Checking Google Books for: ${title}`);
                const gbRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${query}&maxResults=10`);
                const gbData = await gbRes.json();
                
                if (gbData.items) {
                    for (let item of gbData.items) {
                        if (item.volumeInfo?.imageLinks?.thumbnail) {
                            let imgUrl = item.volumeInfo.imageLinks.thumbnail;
                            // Clean up Google's URL: Force HTTPS, remove curled edge, and slightly increase size
                            imgUrl = imgUrl.replace('http:', 'https:').replace('&edge=curl', '') + '&zoom=1'; 
                            return imgUrl;
                        }
                    }
                }
            } catch (e) { console.warn("Google Books API Error:", e); }

            // 2. OpenLibrary Fallback (Now explicitly searches Title & Author fields, Top 10)
            try {
                console.log(`Falling back to OpenLibrary for: ${title}`);
                const olRes = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}&limit=10`);
                const olData = await olRes.json();
                
                if (olData.docs) {
                    for (let doc of olData.docs) {
                        if (doc.cover_i) {
                            return `https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg`;
                        }
                    }
                }
            } catch (e) { console.warn("OpenLibrary API Error:", e); }

            return null; // Both completely failed
        }

        function loadAndApplyCover(bookData, fallbackHue) {
            // First apply the fallback immediately
            bookCover.style.backgroundImage = 'none';
            bookCover.style.backgroundColor = `hsl(${fallbackHue}, 45%, 35%)`;
            coverText.style.display = 'block';
            coverText.innerText = bookData.Titulo;

            fetchBookCover(bookData.Titulo, bookData.Autor).then(url => {
                if (!url) { console.log(`No cover found for ${bookData.Titulo}`); return; }

                console.log(`Cover found! Downloading from: ${url}`);
                const img = new Image();
                img.src = url;
                img.onload = () => {
                    // Only apply if they haven't started a new draw
                    if (chosenBook === bookData) {
                        bookCover.style.backgroundImage = `url('${url}')`;
                        bookCover.style.backgroundColor = `hsl(${fallbackHue}, 45%, 15%)`; 
                        coverText.style.display = 'none'; 
                        console.log(`Cover applied for ${bookData.Titulo}`);
                    }
                };
            });
        }

        // --- BUTTON LOGIC MANAGER ---
        function handleMainAction() {
            if (appState === 'IDLE' || appState === 'OPENED') {
                startSelection();
            } else if (appState === 'WAITING_TO_OPEN') {
                triggerBookOpen();
            }
        }

        function startSelection() {
            appState = 'SPINNING';
            mainBtn.disabled = true;
            mainBtn.innerText = "Searching...";
            mainBtn.classList.remove('btn-action');
            bookObj.classList.remove('open', 'visible');
            statusText.innerText = "Dusting off the shelves...";

            if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }

            // Choose winner and start loading the cover immediately
            const randomIndex = Math.floor(Math.random() * totalBooks);
            chosenBook = booksData[randomIndex];
            
            const seedString = chosenBook.Saga.trim() !== "" ? chosenBook.Saga : chosenBook.Autor;
            currentHue = stringToHue(seedString);
            loadAndApplyCover(chosenBook, currentHue);

            // Populate Text Fields
            tituloDisplay.innerText = chosenBook.Titulo;
            autorDisplay.innerText = chosenBook.Autor;
            if (chosenBook.Saga.trim() !== "") {
                sagaDisplay.innerText = chosenBook.Saga;
                ordenDisplay.innerText = "Libro " + chosenBook.Orden;
                sagaDisplay.style.color = `hsl(${currentHue}, 45%, 35%)`; 
                sagaDisplay.style.display = 'block';
                ordenDisplay.style.display = 'block';
                noSagaMsg.style.display = 'none';
            } else {
                sagaDisplay.style.display = 'none'; ordenDisplay.style.display = 'none'; noSagaMsg.style.display = 'block';
            }

            // Start Roulette Visuals
            let count = 0;
            let lastIdx = -1;
            const interval = setInterval(() => {
                if (lastIdx > -1) shelfBooks[lastIdx].classList.remove('highlight');
                lastIdx = Math.floor(Math.random() * shelfBooks.length);
                shelfBooks[lastIdx].classList.add('highlight');
                playPop(lastIdx);
                
                count++;
                if (count > 35) {
                    clearInterval(interval);
                    shelfBooks[lastIdx].classList.remove('highlight');
                    presentClosedBook();
                }
            }, 70);
        }

        function presentClosedBook() {
            appState = 'WAITING_TO_OPEN';
            
            // Start the music to build tension
            if (currentHue < 120) currentAudio = document.getElementById('audio-warm');
            else if (currentHue < 240) currentAudio = document.getElementById('audio-cool');
            else currentAudio = document.getElementById('audio-bright');
            currentAudio.play();

            // Display Book
            bookObj.style.height = '360px'; 
            bookObj.style.width = '240px';
            bookObj.classList.add('visible');
            statusText.innerText = "A book has been chosen!";

            // Update Button
            mainBtn.disabled = false;
            mainBtn.innerText = "Open Book";
            mainBtn.classList.add('btn-action'); // Makes the button look special
        }

        function triggerBookOpen() {
            appState = 'OPENED';
            mainBtn.disabled = true;
            mainBtn.classList.remove('btn-action');
            
            bookObj.classList.add('open');
            statusText.innerText = `${chosenBook.Titulo}`;
            
            // Pop Confetti matching the Saga's Color!
            confetti({
                particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: [`hsl(${currentHue}, 45%, 35%)`, '#fff', '#e0d9cf']
            });

            // Wait before allowing another draw
            setTimeout(() => {
                mainBtn.disabled = false;
                mainBtn.innerText = "Draw Another";
            }, 2000);
        }
    </script>
</body>
</html>
