<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Magical Library</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fff9f0;
            --ink: #2c1e1a;
        }

        body {
            background-color: #120d0c;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        /* Library Background */
        .library-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            grid-auto-rows: 100px;
            gap: 8px;
            padding: 20px;
            opacity: 0.15;
            z-index: 1;
        }

        .shelf-book {
            width: 100%;
            height: 100%;
            border-radius: 3px;
            transition: all 0.1s;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        h1 {
            color: #d7ccc8;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* The 3D Book Stage */
        .stage {
            width: 100%;
            height: 400px;
            perspective: 2000px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book-wrap {
            width: 200px; /* Closed width */
            height: 280px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), width 1.5s;
            visibility: hidden;
        }

        .book-wrap.visible { visibility: visible; animation: flyIn 0.8s ease-out; }

        /* When open, the container widens to fit both pages */
        .book-wrap.open {
            width: 440px; 
            transform: rotateY(0deg);
        }

        .page {
            position: absolute;
            width: 50%;
            height: 100%;
            top: 0;
            right: 0;
            background: var(--paper);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.1);
            transform-origin: left;
            transition: transform 1.5s;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Front Cover */
        .cover {
            position: absolute;
            width: 50%;
            height: 100%;
            top: 0;
            right: 0;
            z-index: 5;
            transform-origin: left;
            transition: transform 1.5s;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            color: white;
            font-family: 'Dancing Script', cursive;
            border-radius: 0 5px 5px 0;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        .book-wrap.open .cover { transform: rotateY(-180deg); }

        /* Left Page (The underside of the cover or a separate leaf) */
        .page.left {
            left: 0;
            transform: rotateY(-180deg);
            border-radius: 10px 0 0 10px;
            background: linear-gradient(to right, #fff9f0 90%, #e6e0d5 100%);
        }
        .book-wrap.open .page.left { transform: rotateY(0deg); }

        /* Right Page */
        .page.right {
            right: 0;
            border-radius: 0 10px 10px 0;
            background: linear-gradient(to left, #fff9f0 90%, #e6e0d5 100%);
            border-left: 1px solid rgba(0,0,0,0.1);
        }

        .number-box {
            font-size: 6rem;
            color: var(--ink);
            opacity: 0;
            transition: opacity 0.5s 1s;
        }
        .book-wrap.open .number-box { opacity: 1; }

        /* Page details (lines to simulate text) */
        .fake-text {
            width: 70%;
            height: 4px;
            background: #eee;
            margin: 10px 0;
            border-radius: 2px;
        }

        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #8d6e63;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            font-family: 'Playfair Display', serif;
        }

        button:disabled { background: #444; }

        @keyframes flyIn {
            0% { transform: scale(0) translateZ(-500px); opacity: 0; }
            100% { transform: scale(1) translateZ(0); opacity: 1; }
        }

        .highlight { background: #fff !important; box-shadow: 0 0 20px #fff; transform: scale(1.4); z-index: 5; }
    </style>
</head>
<body>

    <div class="library-container" id="library"></div>

    <div class="ui-layer">
        <h1 id="status">Behold the Archive...</h1>
        
        <div class="stage">
            <div class="book-wrap" id="book">
                <!-- Left Page -->
                <div class="page left">
                    <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                        <div class="fake-text"></div><div class="fake-text" style="width: 50%"></div>
                        <div class="fake-text"></div><div class="fake-text"></div>
                    </div>
                </div>
                <!-- Right Page -->
                <div class="page right">
                    <span class="number-box" id="number-display">0</span>
                </div>
                <!-- Cover -->
                <div class="cover" id="cover">What shall we read today?</div>
            </div>
        </div>

        <button id="draw-btn" onclick="startSelection()">Draw a Book</button>
    </div>

    <!-- Music Themes -->
    <audio id="audio-warm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="audio-cool" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="audio-bright" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <script>
        const totalBooks = 234;
        const library = document.getElementById('library');
        const bookWrap = document.getElementById('book');
        const bookCover = document.getElementById('cover');
        const numberDisplay = document.getElementById('number-display');
        const statusText = document.getElementById('status');
        const drawBtn = document.getElementById('draw-btn');
        
        // Initialize Web Audio API for roulette sounds
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPop(pitch) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200 + (pitch * 2), audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        const shelfBooks = [];
        for (let i = 0; i < totalBooks; i++) {
            const b = document.createElement('div');
            b.className = 'shelf-book';
            b.style.backgroundColor = `hsl(${Math.random() * 360}, 20%, 25%)`;
            library.appendChild(b);
            shelfBooks.push(b);
        }

        let currentAudio = null;

        function startSelection() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            
            drawBtn.disabled = true;
            bookWrap.classList.remove('open', 'visible');
            statusText.innerText = "Consulting the shelves...";
            
            let count = 0;
            let lastIdx = -1;

            const interval = setInterval(() => {
                if (lastIdx > -1) shelfBooks[lastIdx].classList.remove('highlight');
                lastIdx = Math.floor(Math.random() * totalBooks);
                shelfBooks[lastIdx].classList.add('highlight');
                
                // Play roulette sound with pitch based on index
                playPop(lastIdx);
                
                count++;
                if (count > 30) {
                    clearInterval(interval);
                    shelfBooks[lastIdx].classList.remove('highlight');
                    finalizeSelection();
                }
            }, 80);
        }

        function finalizeSelection() {
            const result = Math.floor(Math.random() * totalBooks) + 1;
            const hue = Math.floor(Math.random() * 360);
            
            // Randomize Size
            const h = Math.floor(Math.random() * 40) + 260;
            const w = Math.floor(Math.random() * 40) + 180;
            bookWrap.style.height = h + 'px';
            bookWrap.style.width = (w/2) + 'px'; // width of closed book container
            
            bookCover.style.backgroundColor = `hsl(${hue}, 40%, 35%)`;
            
            // Music Selection
            if (hue < 120) currentAudio = document.getElementById('audio-warm');
            else if (hue < 240) currentAudio = document.getElementById('audio-cool');
            else currentAudio = document.getElementById('audio-bright');
            currentAudio.play();

            // Setup display
            numberDisplay.innerText = result;
            bookWrap.classList.add('visible');
            statusText.innerText = "Found it!";

            setTimeout(() => {
                bookWrap.classList.add('open');
                statusText.innerText = `Book ${result} was chosen!`;
                
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.7 },
                    colors: [`hsl(${hue}, 40%, 35%)`, '#fff']
                });

                setTimeout(() => {
                    drawBtn.disabled = false;
                    drawBtn.innerText = "Pick Another";
                }, 2500);
            }, 1200);
        }
    </script>
</body>
</html>
