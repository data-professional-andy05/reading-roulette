<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reading Roulette</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f5efe6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Playfair Display', serif;
            overflow: hidden;
        }

        h1 {
            color: #5d4037;
            margin-bottom: 50px;
            font-size: 2.5rem;
        }

        /* 3D Book Container */
        .scene {
            width: 200px;
            height: 300px;
            perspective: 1000px;
            margin-bottom: 50px;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }

        .book.open {
            transform: rotateY(-160deg);
        }

        .book-cover, .book-page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 5px 15px 15px 5px;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.2);
        }

        .book-cover {
            background-color: #8d6e63;
            color: white;
            z-index: 2;
            transform-origin: left;
            border: 2px solid #5d4037;
        }

        .book-page {
            background-color: #fff9f0;
            z-index: 1;
            font-size: 5rem;
            color: #333;
            border: 1px solid #ddd;
        }

        .book-cover::after {
            content: "Next Adventure?";
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            text-align: center;
            padding: 20px;
        }

        /* Button Styling */
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: #5d4037;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Playfair Display', serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            background-color: #795548;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Shuffling Number Text */
        #number-display {
            font-family: 'Playfair Display', serif;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="title">What are we reading next?</h1>

    <div class="scene">
        <div class="book" id="book">
            <div class="book-cover"></div>
            <div class="book-page">
                <span id="number-display">?</span>
            </div>
        </div>
    </div>

    <button id="draw-btn" onclick="startDraw()">Pick a Book</button>

    <script>
        const book = document.getElementById('book');
        const numberDisplay = document.getElementById('number-display');
        const drawBtn = document.getElementById('draw-btn');
        const title = document.getElementById('title');

        function startDraw() {
            // Reset
            drawBtn.disabled = true;
            book.classList.remove('open');
            title.innerText = "Consulting the library...";
            
            let counter = 0;
            let shuffleInterval = setInterval(() => {
                // Random numbers during "shuffling" phase
                numberDisplay.innerText = Math.floor(Math.random() * 300) + 1;
                counter++;
                
                if (counter > 20) {
                    clearInterval(shuffleInterval);
                    revealResult();
                }
            }, 80);
        }

        function revealResult() {
            // The final choice
            const finalNumber = Math.floor(Math.random() * 300) + 1;
            numberDisplay.innerText = finalNumber;

            // Animate book opening
            setTimeout(() => {
                book.classList.add('open');
                title.innerText = "Happy Reading!";
                
                // Celebration
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#8d6e63', '#f5efe6', '#d4a373']
                });

                // Re-enable button after a delay
                setTimeout(() => {
                    drawBtn.disabled = false;
                    drawBtn.innerText = "Try Again";
                }, 2000);
            }, 200);
        }
    </script>
</body>
</html>
