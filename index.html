<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Musical Library</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1210;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        /* Library Grid Background */
        .library-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(25px, 1fr));
            grid-auto-rows: 90px;
            gap: 5px;
            padding: 10px;
            opacity: 0.2;
            z-index: 1;
        }

        .shelf-book {
            width: 100%;
            height: 100%;
            border-radius: 2px;
            transition: all 0.2s;
        }

        /* UI Elements */
        .ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            color: #e0d5d0;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* 3D Book Logic */
        .stage {
            width: 300px;
            height: 350px;
            perspective: 1500px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .book {
            width: 200px;
            height: 280px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
        }

        .book.visible { visibility: visible; animation: flyIn 0.8s ease-out; }
        
        /* The Actual Flip */
        .book.open {
            transform: rotateY(-180deg) translateX(100px);
        }

        .book-cover, .book-inside {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 4px 12px 12px 4px;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 5px 5px 25px rgba(0,0,0,0.6);
        }

        .book-cover {
            z-index: 2;
            transform-origin: left;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.8);
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            padding: 20px;
            text-align: center;
        }

        /* The page that stays flat while cover flips */
        .book-inside {
            background-color: #fffaf0;
            z-index: 1;
            transform: rotateY(180deg); /* Facing "backwards" so it shows when flipped */
            font-size: 5rem;
            color: #2c1e1a;
            border: 1px solid #dcdcdc;
            box-shadow: inset 5px 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 18px 45px;
            font-size: 1.3rem;
            background: linear-gradient(145deg, #8d6e63, #5d4037);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            font-family: 'Playfair Display', serif;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); background: #a1887f; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        @keyframes flyIn {
            0% { transform: scale(0) translateZ(-500px) rotateX(45deg); opacity: 0; }
            100% { transform: scale(1) translateZ(0) rotateX(0); opacity: 1; }
        }

        .highlight { background: #fff !important; box-shadow: 0 0 20px #fff; transform: scale(1.3); z-index: 5; }
    </style>
</head>
<body>

    <div class="library-container" id="library"></div>

    <div class="ui-layer">
        <h1 id="status">What should we read?</h1>
        
        <div class="stage">
            <div class="book" id="main-book">
                <div class="book-cover" id="cover">Your Next Story...</div>
                <div class="book-inside">
                    <span id="number-display"></span>
                </div>
            </div>
        </div>

        <button id="draw-btn" onclick="startSelection()">Pick a Book</button>
    </div>

    <!-- Background Audio Elements -->
    <audio id="audio-warm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio> <!-- Orchestral -->
    <audio id="audio-cool" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio> <!-- Piano/Chill -->
    <audio id="audio-bright" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio> <!-- Upbeat -->

    <script>
        const library = document.getElementById('library');
        const mainBook = document.getElementById('main-book');
        const bookCover = document.getElementById('cover');
        const numberDisplay = document.getElementById('number-display');
        const statusText = document.getElementById('status');
        const drawBtn = document.getElementById('draw-btn');
        
        const shelfBooks = [];
        for (let i = 0; i < 300; i++) {
            const b = document.createElement('div');
            b.className = 'shelf-book';
            b.style.backgroundColor = `hsl(${Math.random() * 360}, 20%, 25%)`;
            library.appendChild(b);
            shelfBooks.push(b);
        }

        let currentAudio = null;

        function startSelection() {
            if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            
            drawBtn.disabled = true;
            mainBook.classList.remove('open', 'visible');
            statusText.innerText = "Browsing the collection...";
            
            let count = 0;
            let lastIdx = -1;

            const interval = setInterval(() => {
                if (lastIdx > -1) shelfBooks[lastIdx].classList.remove('highlight');
                lastIdx = Math.floor(Math.random() * 300);
                shelfBooks[lastIdx].classList.add('highlight');
                
                count++;
                if (count > 20) {
                    clearInterval(interval);
                    shelfBooks[lastIdx].classList.remove('highlight');
                    finalizeSelection();
                }
            }, 100);
        }

        function finalizeSelection() {
            const result = Math.floor(Math.random() * 300) + 1;
            const hue = Math.floor(Math.random() * 360);
            
            // 1. Randomize Size & Color
            const h = Math.floor(Math.random() * 60) + 250;
            const w = Math.floor(Math.random() * 40) + 180;
            mainBook.style.height = h + 'px';
            mainBook.style.width = w + 'px';
            bookCover.style.backgroundColor = `hsl(${hue}, 45%, 35%)`;
            
            // 2. Map Music to Color
            // Warm (0-120), Cool (121-240), Bright (241-360)
            if (hue < 120) currentAudio = document.getElementById('audio-warm');
            else if (hue < 240) currentAudio = document.getElementById('audio-cool');
            else currentAudio = document.getElementById('audio-bright');
            
            currentAudio.play();

            // 3. Reveal Sequence
            numberDisplay.innerText = result;
            mainBook.classList.add('visible');
            statusText.innerText = "Found it!";

            setTimeout(() => {
                mainBook.classList.add('open'); // This triggers the flip
                statusText.innerText = `You are reading Book #${result}`;
                
                confetti({
                    particleCount: 120,
                    spread: 80,
                    origin: { y: 0.7 },
                    colors: [`hsl(${hue}, 45%, 35%)`, '#fff']
                });

                setTimeout(() => {
                    drawBtn.disabled = false;
                    drawBtn.innerText = "Pick Another";
                }, 2000);
            }, 1200);
        }
    </script>
</body>
</html>
