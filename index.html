<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reading Roulette</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fff9f0;
            --ink: #2c1e1a;
            --book-w: 240px; 
            --book-h: 360px; /* Slightly taller for standard book aspect ratio */
        }

        body {
            background-color: #120d0c;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        .library-container {
            position: absolute; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            grid-auto-rows: 100px; gap: 8px; padding: 20px; opacity: 0.15; z-index: 1;
        }

        .shelf-book { width: 100%; height: 100%; border-radius: 3px; transition: 0.1s; }

        .ui-layer { position: relative; z-index: 10; text-align: center; width: 100%; }

        h1 { color: #d7ccc8; font-size: 2.2rem; margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .stage { perspective: 2000px; width: 600px; height: 420px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }

        .book {
            width: var(--book-w); height: var(--book-h); position: relative;
            transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
        }

        .book.visible { visibility: visible; animation: flyIn 0.8s ease-out; }
        .book.open { transform: translateX(120px) rotateY(0deg); } /* Shifts right when open to stay centered */

        .leaf {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            transform-origin: left; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            backface-visibility: hidden; box-shadow: 5px 5px 20px rgba(0,0,0,0.4); border-radius: 2px 10px 10px 2px;
        }

        .page-right {
            background: linear-gradient(to right, #e6e0d5 0%, var(--paper) 10%, var(--paper) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; transform: rotateY(0deg);
        }

        .page-left {
            background: linear-gradient(to left, #e6e0d5 0%, var(--paper) 10%, var(--paper) 100%);
            z-index: 2; transform: rotateY(0deg); backface-visibility: visible; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box;
        }

        .cover {
            background: #8d6e63; z-index: 4; display: flex; align-items: center; justify-content: center;
            text-align: center; color: white; padding: 20px; font-family: 'Dancing Script', cursive; font-size: 1.5rem;
            border-left: 5px solid rgba(0,0,0,0.4);
            /* Setup for fetched cover images */
            background-size: cover; background-position: center;
            box-shadow: inset 5px 0 15px rgba(0,0,0,0.3); /* Adds a 3D book spine shadow over the image */
        }

        .book.open .cover { transform: rotateY(-180deg); }
        .book.open .page-left { transform: rotateY(-180deg); }

        .book-content {
            opacity: 0; transition: opacity 0.5s 1.2s; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px; width: 100%; height: 100%; box-sizing: border-box;
        }
        
        .book.open .book-content { opacity: 1; }
        .left-content { transform: rotateY(180deg); } /* Un-mirrors text on the left page */

        .titulo-text { font-size: 1.6rem; color: var(--ink); margin-bottom: 10px; line-height: 1.2; }
        .autor-text { font-size: 1rem; color: #555; font-style: italic; }
        .saga-text { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: #8d6e63; margin-bottom: 5px; }
        .orden-text { font-size: 1.1rem; color: var(--ink); }
        .divider { width: 50px; height: 2px; background: #cbbca8; margin: 15px auto; }
        .placeholder-text { color: #a09586; font-style: italic; font-size: 0.9rem; }

        button {
            margin-top: 20px; padding: 18px 45px; font-size: 1.2rem; background: #8d6e63; color: white;
            border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            font-family: 'Playfair Display', serif; transition: 0.3s;
        }
        button:hover { transform: translateY(-3px); background: #a1887f; }
        button:disabled { opacity: 0.5; }

        @keyframes flyIn {
            0% { transform: scale(0) rotateX(30deg) translateZ(-500px); opacity: 0; }
            100% { transform: scale(1) rotateX(0) translateZ(0); opacity: 1; }
        }

        .highlight { background: #fff !important; box-shadow: 0 0 20px #fff; transform: scale(1.4); z-index: 5; }
        
        .loading-text { font-size: 1rem; opacity: 0.7; margin-top: 10px; font-style: italic; display: none;}
    </style>
</head>

    <div class="library-container" id="library"></div>

        <div class="stage">

                        <div class="autor-text" id="autor-display"></div>
                    </div>
                </div>

                <div class="leaf page-left">
                    <div class="book-content left-content">
                        <div class="saga-text" id="saga-display"></div>
                        <div class="orden-text" id="orden-display"></div>
                        <div id="no-saga-msg" class="placeholder-text" style="display: none;">Standalone Adventure</div>
                    </div>
                </div>

                <!-- We wrap the cover text in a span so we can hide it when an image loads -->
                <div class="leaf cover" id="cover"><span id="cover-text">Your next adventure awaits...</span></div>
            </div>
        </div>

        <button id="draw-btn" onclick="startSelection()">Draw a Book</button>
        <div id="loading-indicator" class="loading-text">Dusting off the cover...</div>
    </div>

        const totalBooks = booksData.length;
        const library = document.getElementById('library');
        const bookObj = document.getElementById('book');
        const bookCover = document.getElementById('cover');
        const coverText = document.getElementById('cover-text');
        const statusText = document.getElementById('status');
        const drawBtn = document.getElementById('draw-btn');
        const loadingIndicator = document.getElementById('loading-indicator');

        const tituloDisplay = document.getElementById('titulo-display');
        const autorDisplay = document.getElementById('autor-display');
        const sagaDisplay = document.getElementById('saga-display');
        const ordenDisplay = document.getElementById('orden-display');
        const noSagaMsg = document.getElementById('no-saga-msg');
        
        let audioCtx;
        let currentAudio = null;
        let preFetchedCoverUrl = null; 
        let chosenBook = null;

        function playPop(pitch) {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            const now = audioCtx.currentTime + 0.01;
            
            osc.frequency.setValueAtTime(150 + (pitch * 1.5), now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(now); osc.stop(now + 0.1);
        }

        function stringToHue(str) {
            if (!str) return Math.floor(Math.random() * 360);
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return Math.abs(hash) % 360;
        }

        const visualBooksCount = Math.max(totalBooks, 150); 
        const shelfBooks = [];
        for (let i = 0; i < visualBooksCount; i++) {
            const b = document.createElement('div');
            b.className = 'shelf-book';
            b.style.backgroundColor = `hsl(${Math.random() * 360}, 25%, 25%)`;
            library.appendChild(b);
            shelfBooks.push(b);
        }

        // --- ROBUST COVER FETCHING FUNCTION ---
        async function fetchBookCover(title, author) {
            const query = encodeURIComponent(`${title} ${author}`);
            
            // 1. Try Google Books API (Usually more accurate and higher res)
            try {
                const gbRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${query}&maxResults=1`);
                const gbData = await gbRes.json();
                if (gbData.items && gbData.items.length > 0) {
                    let img = gbData.items[0].volumeInfo?.imageLinks?.thumbnail;
                    if (img) {
                        // Force HTTPS to prevent mixed-content security errors
                        img = img.replace('http:', 'https:');
                        // Hack to get slightly higher res from Google Books
                        return img.replace('&edge=curl', '') + '&zoom=1'; 
                    }
                }
            } catch (e) { console.warn("Google Books API missed:", e); }

            // 2. Try OpenLibrary API as Fallback
            try {
                const olRes = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}&limit=1`);
                const olData = await olRes.json();
                if (olData.docs && olData.docs.length > 0) {
                    const coverId = olData.docs[0].cover_i;
                    if (coverId) {
                        return `https://covers.openlibrary.org/b/id/${coverId}-L.jpg`;
                    }
                }
            } catch (e) { console.warn("OpenLibrary API missed:", e); }

            // 3. Fail gracefully
            return null; 
        }

        function startSelection() {
            if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            
            drawBtn.disabled = true;
            bookObj.classList.remove('open', 'visible');
            statusText.innerText = "Searching the collection...";
            loadingIndicator.style.display = "block";
            
            // Reset cover for a new draw
            bookCover.style.backgroundImage = 'none';
            coverText.style.display = 'block';
            coverText.innerText = "Binding the pages...";

            // SECRETLY CHOOSE THE WINNER IMMEDIATELY
            const randomIndex = Math.floor(Math.random() * totalBooks);
            chosenBook = booksData[randomIndex];

            // START FETCHING COVER IN THE BACKGROUND WHILE ANIMATION PLAYS
            preFetchedCoverUrl = null; // reset
            fetchBookCover(chosenBook.Titulo, chosenBook.Autor).then(url => {
                preFetchedCoverUrl = url;
            });

            // Start Roulette Visuals
            let count = 0;
            let lastIdx = -1;
            const interval = setInterval(() => {
                if (lastIdx > -1) shelfBooks[lastIdx].classList.remove('highlight');
                lastIdx = Math.floor(Math.random() * shelfBooks.length);
                shelfBooks[lastIdx].classList.add('highlight');
                playPop(lastIdx);
                
                count++;
                if (count > 35) {
                    clearInterval(interval);
                    shelfBooks[lastIdx].classList.remove('highlight');
                    finalizeSelection();
                }
            }, 70);
        }

        function finalizeSelection() {
            loadingIndicator.style.display = "none";
            const seedString = chosenBook.Saga.trim() !== "" ? chosenBook.Saga : chosenBook.Autor;
            const hue = stringToHue(seedString);
            
            bookObj.style.height = '360px'; // Standardize size to fit fetched images nicely
            bookObj.style.width = '240px';
            
            // APPLY THE FETCHED COVER (Or fallback to color)
            if (preFetchedCoverUrl) {
                bookCover.style.backgroundImage = `url('${preFetchedCoverUrl}')`;
                coverText.style.display = 'none'; // hide the fallback text
                bookCover.style.backgroundColor = `hsl(${hue}, 45%, 15%)`; // Dark behind image
            } else {
                bookCover.style.backgroundImage = 'none';
                bookCover.style.backgroundColor = `hsl(${hue}, 45%, 35%)`;
                coverText.style.display = 'block';
                coverText.innerText = chosenBook.Titulo;
            }
            
            // Populate Text Fields
            tituloDisplay.innerText = chosenBook.Titulo;
            autorDisplay.innerText = chosenBook.Autor;

            if (chosenBook.Saga.trim() !== "") {
                sagaDisplay.innerText = chosenBook.Saga;
                ordenDisplay.innerText = "Book " + chosenBook.Orden;
                sagaDisplay.style.color = `hsl(${hue}, 45%, 35%)`; 
                sagaDisplay.style.display = 'block';
                ordenDisplay.style.display = 'block';
                noSagaMsg.style.display = 'none';
            } else {
                sagaDisplay.style.display = 'none';
                ordenDisplay.style.display = 'none';
                noSagaMsg.style.display = 'block';
            }
            
            // Select and Play Theme Music
            if (hue < 120) currentAudio = document.getElementById('audio-warm');
            else if (hue < 240) currentAudio = document.getElementById('audio-cool');
            else currentAudio = document.getElementById('audio-bright');
            currentAudio.play();

            bookObj.classList.add('visible');
            statusText.innerText = "Your next adventure!";

            setTimeout(() => {
                bookObj.classList.add('open');
                statusText.innerText = `${chosenBook.Titulo}`;
                
                confetti({
                    particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: [`hsl(${hue}, 45%, 35%)`, '#fff']
                });

                setTimeout(() => {
                    drawBtn.disabled = false;
                    drawBtn.innerText = "Draw Another";
                }, 2500);
            }, 1200);
        }
