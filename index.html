<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reading Roulette</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fff9f0;
            --ink: #2c1e1a;
            --book-w: 240px; 
            --book-h: 340px; 
        }

        body {
            background-color: #120d0c;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        /* Library Background */
        .library-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            grid-auto-rows: 100px;
            gap: 8px;
            padding: 20px;
            opacity: 0.15;
            z-index: 1;
        }

        .shelf-book { width: 100%; height: 100%; border-radius: 3px; transition: 0.1s; }

        .ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #d7ccc8;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* 3D Stage */
        .stage {
            perspective: 2000px;
            width: 600px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Book Container */
        .book {
            width: var(--book-w);
            height: var(--book-h);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
        }

        .book.visible { visibility: visible; animation: flyIn 0.8s ease-out; }
        .book.open { transform: rotateY(0deg); }

        /* Pages & Cover Shared Styling */
        .leaf {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            backface-visibility: hidden;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.4);
            border-radius: 2px 10px 10px 2px;
        }

        /* The Right Page */
        .page-right {
            background: linear-gradient(to right, #e6e0d5 0%, var(--paper) 10%, var(--paper) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transform: rotateY(0deg);
        }

        /* The Left Page */
        .page-left {
            background: linear-gradient(to left, #e6e0d5 0%, var(--paper) 10%, var(--paper) 100%);
            z-index: 2;
            transform: rotateY(0deg); 
            backface-visibility: visible; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* The Cover */
        .cover {
            background: #8d6e63;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 30px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            border-left: 5px solid rgba(0,0,0,0.2);
        }

        /* Open Book Animations */
        .book.open .cover { transform: rotateY(-180deg); }
        .book.open .page-left { transform: rotateY(-180deg); }

        /* Interior Details & Text Formatting */
        .book-content {
            opacity: 0;
            transition: opacity 0.5s 1.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
        
        .book.open .book-content { opacity: 1; }

        /* Fix mirroring on the left page when it rotates */
        .left-content { transform: rotateY(180deg); }

        /* Typography for Book Details */
        .titulo-text { font-size: 1.6rem; color: var(--ink); margin-bottom: 10px; line-height: 1.2; }
        .autor-text { font-size: 1rem; color: #555; font-style: italic; }
        .saga-text { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: #8d6e63; margin-bottom: 5px; }
        .orden-text { font-size: 1.1rem; color: var(--ink); }
        .divider { width: 50px; height: 2px; background: #cbbca8; margin: 15px auto; }
        
        .placeholder-text { color: #a09586; font-style: italic; font-size: 0.9rem; }

        button {
            margin-top: 20px;
            padding: 18px 45px;
            font-size: 1.2rem;
            background: #8d6e63;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            font-family: 'Playfair Display', serif;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-3px); background: #a1887f; }
        button:disabled { opacity: 0.5; }

        @keyframes flyIn {
            0% { transform: scale(0) rotateX(30deg) translateZ(-500px); opacity: 0; }
            100% { transform: scale(1) rotateX(0) translateZ(0); opacity: 1; }
        }

        .highlight { background: #fff !important; box-shadow: 0 0 20px #fff; transform: scale(1.4); z-index: 5; }
    </style>
</head>
<body>

    <div class="library-container" id="library"></div>

    <div class="ui-layer">
        <h1 id="status">Behold the Archive...</h1>
        
        <div class="stage">
            <div class="book" id="book">
                <!-- Page Right (Title & Author) -->
                <div class="leaf page-right">
                    <div class="book-content">
                        <div class="titulo-text" id="titulo-display"></div>
                        <div class="divider"></div>
                        <div class="autor-text" id="autor-display"></div>
                    </div>
                </div>

                <!-- Page Left (Saga & Order) -->
                <div class="leaf page-left">
                    <!-- Left content is wrapped here to flip it upright after the page turns -->
                    <div class="book-content left-content">
                        <div class="saga-text" id="saga-display"></div>
                        <div class="orden-text" id="orden-display"></div>
                        <div id="no-saga-msg" class="placeholder-text" style="display: none;">Standalone Adventure</div>
                    </div>
                </div>

                <!-- Cover -->
                <div class="leaf cover" id="cover">Your next adventure awaits...</div>
            </div>
        </div>

        <button id="draw-btn" onclick="startSelection()">Draw a Book</button>
    </div>

    <!-- Music Themes -->
    <audio id="audio-warm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="audio-cool" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="audio-bright" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <script>
        // -------------------------------------------------------------
        // Replace this array with the data from her Google Sheets!
        // -------------------------------------------------------------
        const booksData = [
            { Titulo: "A Court of Thorns and Roses", Autor: "Sarah J. Maas", Saga: "ACOTAR", Orden: "1" },
            { Titulo: "A Court of Mist and Fury", Autor: "Sarah J. Maas", Saga: "ACOTAR", Orden: "2" },
            { Titulo: "Mistborn: The Final Empire", Autor: "Brandon Sanderson", Saga: "Mistborn", Orden: "1" },
            { Titulo: "The Well of Ascension", Autor: "Brandon Sanderson", Saga: "Mistborn", Orden: "2" },
            { Titulo: "The Hobbit", Autor: "J.R.R. Tolkien", Saga: "", Orden: "" },
            { Titulo: "Pride and Prejudice", Autor: "Jane Austen", Saga: "", Orden: "" },
            { Titulo: "Dune", Autor: "Frank Herbert", Saga: "Dune Chronicles", Orden: "1" }
        ];

        const totalBooks = booksData.length;
        const library = document.getElementById('library');
        const bookObj = document.getElementById('book');
        const bookCover = document.getElementById('cover');
        const statusText = document.getElementById('status');
        const drawBtn = document.getElementById('draw-btn');

        // Text Displays
        const tituloDisplay = document.getElementById('titulo-display');
        const autorDisplay = document.getElementById('autor-display');
        const sagaDisplay = document.getElementById('saga-display');
        const ordenDisplay = document.getElementById('orden-display');
        const noSagaMsg = document.getElementById('no-saga-msg');
        
        let audioCtx;

        function playPop(pitch) {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            const now = audioCtx.currentTime + 0.01;
            
            osc.frequency.setValueAtTime(150 + (pitch * 1.5), now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(now);
            osc.stop(now + 0.1);
        }

        // Helper: Convert string (like Saga name) to a consistent color Hue (0-360)
        function stringToHue(str) {
            if (!str) return Math.floor(Math.random() * 360);
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            return Math.abs(hash) % 360;
        }

        // Generate Library Background (Using visual dots for all books)
        // If there are few books, we multiply them visually for the background aesthetic
        const visualBooksCount = Math.max(totalBooks, 150); 
        const shelfBooks = [];
        for (let i = 0; i < visualBooksCount; i++) {
            const b = document.createElement('div');
            b.className = 'shelf-book';
            b.style.backgroundColor = `hsl(${Math.random() * 360}, 25%, 25%)`;
            library.appendChild(b);
            shelfBooks.push(b);
        }

        let currentAudio = null;

        function startSelection() {
            if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            
            drawBtn.disabled = true;
            bookObj.classList.remove('open', 'visible');
            statusText.innerText = "Searching the collection...";
            
            let count = 0;
            let lastIdx = -1;

            const interval = setInterval(() => {
                if (lastIdx > -1) shelfBooks[lastIdx].classList.remove('highlight');
                lastIdx = Math.floor(Math.random() * shelfBooks.length);
                shelfBooks[lastIdx].classList.add('highlight');
                
                playPop(lastIdx);
                
                count++;
                if (count > 35) {
                    clearInterval(interval);
                    shelfBooks[lastIdx].classList.remove('highlight');
                    finalizeSelection();
                }
            }, 70);
        }

        function finalizeSelection() {
            // Pick a random book from your actual data
            const randomIndex = Math.floor(Math.random() * totalBooks);
            const chosenBook = booksData[randomIndex];

            // Determine Color based on Saga (or Author if standalone). 
            // This groups series books into the exact same color & music!
            const seedString = chosenBook.Saga.trim() !== "" ? chosenBook.Saga : chosenBook.Autor;
            const hue = stringToHue(seedString);
            
            const h = Math.floor(Math.random() * 40) + 320;
            const w = Math.floor(Math.random() * 30) + 220;
            bookObj.style.height = h + 'px';
            bookObj.style.width = w + 'px';
            bookCover.style.backgroundColor = `hsl(${hue}, 45%, 35%)`;
            
            // Populate the text fields
            tituloDisplay.innerText = chosenBook.Titulo;
            autorDisplay.innerText = chosenBook.Autor;

            if (chosenBook.Saga.trim() !== "") {
                sagaDisplay.innerText = chosenBook.Saga;
                ordenDisplay.innerText = "Book " + chosenBook.Orden;
                sagaDisplay.style.color = `hsl(${hue}, 45%, 35%)`; // match saga text to cover
                sagaDisplay.style.display = 'block';
                ordenDisplay.style.display = 'block';
                noSagaMsg.style.display = 'none';
            } else {
                sagaDisplay.style.display = 'none';
                ordenDisplay.style.display = 'none';
                noSagaMsg.style.display = 'block';
            }
            
            // Select and Play Theme Music
            if (hue < 120) currentAudio = document.getElementById('audio-warm');
            else if (hue < 240) currentAudio = document.getElementById('audio-cool');
            else currentAudio = document.getElementById('audio-bright');
            currentAudio.play();

            bookObj.classList.add('visible');
            statusText.innerText = "A choice has been made!";

            setTimeout(() => {
                bookObj.classList.add('open');
                statusText.innerText = `You are reading ${chosenBook.Titulo}`;
                
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.7 },
                    colors: [`hsl(${hue}, 45%, 35%)`, '#fff']
                });

                setTimeout(() => {
                    drawBtn.disabled = false;
                    drawBtn.innerText = "Draw Again";
                }, 2500);
            }, 1200);
        }
    </script>
</body>
</html>
